[package]
name = "obscura_split"
type = "bin"
authors = ["Tonkl Protocol"]
compiler_version = ">=0.31.0"

# Tonkl Split Circuit — 1-in/32-out (production)
#
# Splits a single input note into up to 32 output notes, each potentially
# owned by a different recipient. This is the multi-send primitive:
# one high-value note becomes multiple smaller notes distributed to
# different parties. For fewer than 32 real recipients, pad with
# zero-value notes owned by the sender to avoid leaking recipient count.
#
# Whitepaper refs:
#   Section 7.5 - Enforced output templates
#   Section 8.3 - Noir as unified circuit DSL
#   Section 8.6 - MVP Phase 1 circuit scope

[dependencies]
obscura_lib = { path = "../obscura-lib" }
